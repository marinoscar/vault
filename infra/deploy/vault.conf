# =============================================================================
# vault.marin.cr — VPS Reverse Proxy Config
# =============================================================================
# This is the reference copy. The install script generates a copy with
# variable substitution at /opt/infra/apps/vault/vault.conf, which is then
# copied to /opt/infra/proxy/nginx/conf.d/vault.conf.
# =============================================================================

server {
    listen 443 ssl http2;
    server_name vault.marin.cr;

    ssl_certificate     /etc/letsencrypt/live/vault.marin.cr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.marin.cr/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow large request bodies (file uploads)
    # Disable body size limit (multi-GB file uploads via S3 multipart)
    client_max_body_size 0;

    # API routes
    location /api {
        proxy_pass http://127.0.0.1:8322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://127.0.0.1:8322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name vault.marin.cr;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}
